<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#062452" />
  <meta name="description" content="Acesso ao Memorial Online" />
  <title>Memorial Online | Login</title>
  <link rel="preload" href="assets/logo-memorial-online.png" as="image" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="login-page">
  <main class="page-shell" aria-labelledby="loginTitle">
    <section class="login-wrap">
      <header class="brand" aria-label="Memorial Online">
        <img src="assets/logo-memorial-online.png" alt="Memorial Online - Conectando memórias, eternizando amores" class="brand-logo" />
      </header>

      <section class="login-card" aria-label="Área de acesso">
        <div class="card-ornament" aria-hidden="true">♥</div>

        <div class="form-header">
          <p class="eyebrow">Acesso ao memorial</p>
          <h1 id="loginTitle">Entrar</h1>
          <p class="subtitle" id="modeDescription">Use o e-mail cadastrado para acessar o memorial.</p>
        </div>

        <form id="loginForm" novalidate>
          <div class="field-group account-field">
            <label for="email">E-mail</label>
            <div class="input-shell">
              <span class="input-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false"><path d="M4.5 6.75h15a1.5 1.5 0 0 1 1.5 1.5v7.5a1.5 1.5 0 0 1-1.5 1.5h-15a1.5 1.5 0 0 1-1.5-1.5v-7.5a1.5 1.5 0 0 1 1.5-1.5Zm.9 1.5 6.6 4.62 6.6-4.62M4.5 9.15l6.75 4.72a1.3 1.3 0 0 0 1.5 0l6.75-4.72"/></svg>
              </span>
              <input id="email" name="email" type="email" inputmode="email" autocomplete="email" placeholder="Digite seu e-mail" />
            </div>
            <small class="error-message" id="emailError"></small>
          </div>

          <div class="field-group account-field">
            <label for="password">Senha</label>
            <div class="input-shell">
              <span class="input-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false"><path d="M7 10V8a5 5 0 0 1 10 0v2m-11.5 0h13a1.5 1.5 0 0 1 1.5 1.5v7A1.5 1.5 0 0 1 18.5 20h-13A1.5 1.5 0 0 1 4 18.5v-7A1.5 1.5 0 0 1 5.5 10Zm6.5 3.6v2.1"/></svg>
              </span>
              <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Digite sua senha" />
              <button class="icon-button" id="togglePassword" type="button" aria-label="Mostrar senha" aria-pressed="false">
                <svg viewBox="0 0 24 24" focusable="false"><path d="M2.8 12s3.35-5.5 9.2-5.5 9.2 5.5 9.2 5.5-3.35 5.5-9.2 5.5S2.8 12 2.8 12Zm9.2 2.25A2.25 2.25 0 1 0 12 9.75a2.25 2.25 0 0 0 0 4.5Z"/></svg>
              </button>
            </div>
            <small class="error-message" id="passwordError"></small>
          </div>

          <div class="field-group code-field is-hidden">
            <label for="memorialCode">Código do memorial</label>
            <div class="input-shell">
              <span class="input-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false"><path d="M4 5.5A1.5 1.5 0 0 1 5.5 4h3v4h-4v-2.5Zm11.5-1.5h3A1.5 1.5 0 0 1 20 5.5v3h-4v-4.5Zm-11 11.5h4v4h-3A1.5 1.5 0 0 1 4 18v-2.5Zm11.5.5h4v2A1.5 1.5 0 0 1 18.5 19.5h-3V16ZM11 4h2v4h-2V4Zm-7 7h4v2H4v-2Zm7 0h2v2h-2v-2Zm5 0h4v2h-4v-2Zm-5 5h2v4h-2v-4Z"/></svg>
              </span>
              <input id="memorialCode" name="memorialCode" type="text" inputmode="text" autocomplete="one-time-code" placeholder="Ex.: memorial2026" autocapitalize="none" />
            </div>
            <small class="error-message" id="codeError"></small>
          </div>

          <button class="primary-button" id="submitButton" type="submit">
            <span class="button-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false"><path d="M7 10V8a5 5 0 0 1 10 0v2m-11.5 0h13a1.5 1.5 0 0 1 1.5 1.5v7A1.5 1.5 0 0 1 18.5 20h-13A1.5 1.5 0 0 1 4 18.5v-7A1.5 1.5 0 0 1 5.5 10Z"/></svg>
            </span>
            <span id="submitText">Acessar memorial</span>
          </button>

          <div class="form-actions account-actions">
            <button class="link-button" id="forgotPassword" type="button">Esqueci minha senha</button>
          </div>

          <div class="divider" aria-hidden="true"><span></span></div>

          <button class="secondary-button" id="switchMode" type="button">
            Entrar com código do memorial
          </button>
        </form>

        <div class="demo-access" aria-label="Dados de teste">
          <strong>Teste:</strong> memorial@gmail.com / 1234<br />
          <strong>Código:</strong> memorial2026
        </div>

        <div class="status-message" id="statusMessage" role="status" aria-live="polite"></div>
      </section>
    </section>
  </main>

  <dialog class="recovery-modal" id="recoveryModal" aria-labelledby="recoveryTitle">
    <form method="dialog" class="modal-content">
      <button class="modal-close" value="cancel" aria-label="Fechar">×</button>
      <h2 id="recoveryTitle">Recuperar senha</h2>
      <p>Este é um protótipo. Em produção, o sistema enviaria um link seguro para redefinição.</p>
      <label for="recoveryEmail">E-mail</label>
      <input id="recoveryEmail" type="email" inputmode="email" autocomplete="email" placeholder="seuemail@dominio.com" />
      <button class="primary-button modal-button" value="default">Enviar instruções</button>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
